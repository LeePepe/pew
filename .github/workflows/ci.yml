name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Permissions required for osv-scanner SARIF upload
permissions:
  contents: read
  security-events: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: G1 Static Analysis
        run: bun run lint

      - name: L1 Unit Tests + Coverage
        run: bun run test:coverage

      - name: Build
        run: bun run build

      - name: G2a Dependency CVE Scan
        uses: google/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        with:
          scan-args: |-
            --lockfile=bun.lock
